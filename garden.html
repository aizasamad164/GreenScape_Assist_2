<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Garden – GreenScape Assist</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="app-page">

  <div class="app-shell">
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <h1 class="header-title">🌱 GreenScape Assist</h1>
        <button class="icon-btn" aria-label="Profile">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
      </div>
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search plants..." class="search-input" oninput="filterPlants()" />
      </div>
    </header>

    <!-- Plant Grid -->
    <main class="main-scroll">
      <div id="plantGrid" class="plant-grid"></div>
    </main>

    <!-- FAB -->
    <a href="add-plant.html" class="fab" aria-label="Add plant">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </a>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="garden.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Garden</span>
      </a>
      <a href="tasks.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Tasks</span>
      </a>
      <a href="journal.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>Journal</span>
      </a>
    </nav>
  </div>

  <script src="scripts/data.js"></script>
  <script>
    function getDaysUntilWatering(plant) {
      const last = new Date(plant.lastWatered);
      const next = new Date(last);
      next.setDate(next.getDate() + plant.wateringFrequency);
      return Math.ceil((next - new Date()) / 86400000);
    }

    function renderPlants(plants) {
      const grid = document.getElementById('plantGrid');
      if (!plants.length) {
        grid.innerHTML = '<p class="empty-state">No plants found. Add your first plant!</p>';
        return;
      }
      grid.innerHTML = plants.map(plant => {
        const days = getDaysUntilWatering(plant);
        const needsWater = days <= 1;
        const statusClass = needsWater ? 'status-water' : 'status-healthy';
        const statusLabel = needsWater ? '💧 Needs Water' : '✅ Healthy';
        return `
          <a href="plant-detail.html?id=${plant.id}" class="plant-card">
            <div class="plant-card-img">
              <img src="${plant.image}" alt="${plant.name}" onerror="this.src='https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=400'" />
            </div>
            <div class="plant-card-body">
              <h3 class="plant-name">${plant.name}</h3>
              <p class="plant-species">${plant.species}</p>
              <div class="plant-status ${statusClass}">${statusLabel}</div>
            </div>
          </a>`;
      }).join('');
    }

    function filterPlants() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const plants = getPlants();
      renderPlants(plants.filter(p =>
        p.name.toLowerCase().includes(q) || p.species.toLowerCase().includes(q)
      ));
    }

    renderPlants(getPlants());
  </script>
</body>
</html>
