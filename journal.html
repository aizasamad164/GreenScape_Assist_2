<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal – GreenScape Assist</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="app-page">

  <div class="app-shell">
    <header class="app-header">
      <div class="header-inner">
        <div>
          <h1 class="header-title">Garden Journal</h1>
          <p class="header-sub" id="entryCount"></p>
        </div>
        <button class="icon-btn icon-btn--green" onclick="openModal()" aria-label="New entry">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </header>

    <main class="main-scroll">
      <div id="entryList" class="entry-list"></div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="garden.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Garden</span>
      </a>
      <a href="tasks.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Tasks</span>
      </a>
      <a href="journal.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>Journal</span>
      </a>
    </nav>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop hidden" id="modalBackdrop" onclick="closeModal()"></div>
  <div class="modal hidden" id="modal">
    <div class="modal-header">
      <h2 class="modal-title">New Journal Entry</h2>
      <button class="icon-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label" for="entryTitle">Title <span class="required">*</span></label>
      <input class="form-input" type="text" id="entryTitle" placeholder="What's happening in your garden?" />
    </div>
    <div class="form-group">
      <label class="form-label" for="entryPlant">Related Plant <span class="optional">(optional)</span></label>
      <select class="form-input form-select" id="entryPlant">
        <option value="">None</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="entryContent">Entry <span class="required">*</span></label>
      <textarea class="form-input form-textarea" id="entryContent" rows="5" placeholder="Write about your observations, progress, or ideas..."></textarea>
    </div>
    <div class="btn-row mt-4">
      <button class="btn-primary flex-1" onclick="submitEntry()">Save Entry</button>
      <button class="btn-outline flex-1" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script src="scripts/data.js"></script>
  <script>
    function renderEntries() {
      const entries = getJournalEntries();
      document.getElementById('entryCount').textContent =
        `${entries.length} entr${entries.length !== 1 ? 'ies' : 'y'}`;

      const container = document.getElementById('entryList');
      if (!entries.length) {
        container.innerHTML = `<div class="empty-card">
          <div class="empty-emoji">🌿</div>
          <p>No journal entries yet</p>
          <p class="empty-sub">Start documenting your gardening journey!</p>
        </div>`;
        return;
      }

      container.innerHTML = entries.map(entry => {
        const date = new Date(entry.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const plantBadge = entry.plantName
          ? `<span class="plant-tag">🌱 ${entry.plantName}</span>` : '';
        return `<div class="journal-card">
          <div class="journal-card-header">
            <div>
              <h3 class="journal-title">${entry.title}</h3>
              ${plantBadge}
            </div>
            <span class="journal-date">${date}</span>
          </div>
          <p class="journal-content">${entry.content}</p>
        </div>`;
      }).join('');
    }

    function openModal() {
      // Populate plant selector
      const select = document.getElementById('entryPlant');
      select.innerHTML = '<option value="">None</option>' +
        getPlants().map(p => `<option value="${p.id}" data-name="${p.name}">${p.name}</option>`).join('');
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalBackdrop').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modalBackdrop').classList.add('hidden');
      document.getElementById('entryTitle').value = '';
      document.getElementById('entryContent').value = '';
      document.getElementById('entryPlant').value = '';
    }

    function submitEntry() {
      const title = document.getElementById('entryTitle').value.trim();
      const content = document.getElementById('entryContent').value.trim();
      if (!title || !content) {
        showToast('Please fill in all required fields', 'error');
        return;
      }
      const plantSelect = document.getElementById('entryPlant');
      const plantId = plantSelect.value;
      const plantName = plantId ? plantSelect.options[plantSelect.selectedIndex].dataset.name : undefined;

      addJournalEntry({
        id: Date.now().toString(),
        date: new Date().toISOString(),
        title, content, plantId: plantId || undefined, plantName
      });
      showToast('Journal entry saved! 📖');
      closeModal();
      renderEntries();
    }

    renderEntries();
  </script>
</body>
</html>
